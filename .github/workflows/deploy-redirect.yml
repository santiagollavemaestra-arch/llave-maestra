name: GitHub Pages → Redirect a Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Crear páginas de redirect
        run: |
          mkdir dist
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=https://llave-maestra.vercel.app">
            <script>window.location.replace("https://llave-maestra.vercel.app")</script>
            <title>Redirigiendo...</title>
          </head>
          <body>
            <p>Redirigiendo a <a href="https://llave-maestra.vercel.app">llave-maestra.vercel.app</a>...</p>
          </body>
          </html>
          EOF
          cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'
      - id: deployment
        uses: actions/deploy-pages@v5
